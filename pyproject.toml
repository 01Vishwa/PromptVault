[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "agent-eval-framework"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "langchain>=0.2",
    "langchain-anthropic>=0.1",
    "anthropic>=0.25",
    "opentelemetry-sdk>=1.24",
    "opentelemetry-exporter-otlp-proto-grpc>=1.24",
    "opentelemetry-semantic-conventions>=0.45b0",
    "fastapi>=0.111",
    "uvicorn[standard]>=0.29",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.29",
    "alembic>=1.13",
    "pydantic>=2.7",
    "python-dotenv>=1.0",
    "rich>=13.7",
    "jinja2>=3.1",
    "pytest>=8.2",
    "pytest-asyncio>=0.23",
    "scikit-learn>=1.4",
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio", "httpx"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = [
    "unit: fast unit tests, no external services",
    "integration: requires docker-compose up",
    "regression: auto-generated from HITL annotations",
    "flywheel: end-to-end flywheel demonstration",
]
testpaths = ["tests"]
