name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ── Backend: Lint ────────────────────────────────────────────────────
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check backend/

      - name: Format check
        run: ruff format --check backend/

  # ── Backend: Type Check ──────────────────────────────────────────────
  backend-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: cd backend && pip install -e ".[dev]"

      - name: Mypy
        run: cd backend && mypy app/

  # ── Backend: Tests ───────────────────────────────────────────────────
  backend-test:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: http://placeholder.invalid
      SUPABASE_ANON_KEY: placeholder
      SUPABASE_SERVICE_ROLE_KEY: placeholder
      SUPABASE_JWT_SECRET: ci-test-secret-key-at-least-32-chars

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: cd backend && pip install -e ".[dev]"

      - name: Run tests
        run: cd backend && pytest --cov=app --cov-report=xml -x -v

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ── Frontend: Lint & Type Check ──────────────────────────────────────
  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: cd frontend && npm ci

      - name: Lint
        run: cd frontend && npm run lint

      - name: Type check
        run: cd frontend && npm run type-check

  # ── Frontend: Build ─────────────────────────────────────────────────
  frontend-build:
    runs-on: ubuntu-latest
    needs: frontend-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build

  # ── Frontend: Tests ─────────────────────────────────────────────────
  frontend-test:
    runs-on: ubuntu-latest
    needs: frontend-check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: cd frontend && npm ci

      - name: Test
        run: cd frontend && npm test

  # ── Docker: Build Images ────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, frontend-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t promptvault-api:${{ github.sha }} backend/

      - name: Build frontend image
        run: docker build -t promptvault-ui:${{ github.sha }} frontend/
